<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Velotech Systems Ltd</title>
  <style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #0f172a;
    color: white;
    text-align: center;
}
.container {
    padding: 80px 20px;
}
.logo {
    font-size: 36px;
    font-weight: bold;
    margin-bottom: 20px;
}
.tagline {
    font-size: 18px;
    color: #94a3b8;
    margin-bottom: 40px;
}
.section {
    max-width: 600px;
    margin: auto;
    margin-bottom: 40px;
}
.footer {
    font-size: 14px;
    color: #64748b;
    margin-top: 60px;
}
.product-link {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
}
.product-name {
    font-size: 22px;
    font-weight: bold;
    color: #38bdf8;
}
.product-card {
    list-style: none;
    display: inline-block;
    padding: 25px 30px;
    border: 1px solid #1e293b;

    background-color: #020617;
    box-shadow: 0 0 20px rgba(56, 189, 248, 0.1);
    transition: all 0.3s ease;

.product-card:hover {
    border-color: #38bdf8;
    box-shadow: 0 0 25px rgba(56, 189, 248, 0.4);
    transform: translateY(-5px);
}
a {
    color: #38bdf8;
    text-decoration: none;

  <div class="logo">
        <div>

        <li class="product-card">
